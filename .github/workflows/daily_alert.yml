name: Daily LOC Alert (15:00 KST)

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 22:00 UTC = 07:00 KST 다음날, 월~금 (미국장 마감 후)
  workflow_dispatch:          # 수동 실행 버튼 (테스트용)

jobs:
  send-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance gspread google-auth requests pandas

      - name: Run daily alert script
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          ADMIN_SHEET_URL: ${{ secrets.ADMIN_SHEET_URL }}
        run: python scripts/daily_telegram_alert.py
